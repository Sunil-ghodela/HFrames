<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>preview</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /*
       * The template's #stage is sized to the reel's native dimensions
       * (1080x1920 for 9:16, etc.). The iframe viewport is much smaller,
       * so we apply a transform: scale() that fits #stage into the iframe
       * while preserving aspect ratio. fitStage() runs after hydration and
       * on resize.
       */
      #stage {
        transform-origin: center center;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="stage-host"></div>
    <script type="module">
      // The iframe waits for the host React app to post a 'load' event with
      // { templateHtml, schema, brand, vars, aspect, duration }. We then
      // splice templateHtml into <body> (replacing #stage-host) and run the
      // client hydrator + asset resolver. Vite serves the hydrator/resolver
      // source files at known dev URLs; prod bundling is post-MVP.

      let state = null;

      function postToHost(msg) {
        window.parent.postMessage(msg, "*");
      }

      // Tell the parent we have our message listener attached. Without this,
      // the parent might post 'load' before this module's script body has
      // executed (module scripts are deferred), and the load message gets
      // dropped on the floor.
      postToHost({ type: "mounted" });

      window.addEventListener("error", (ev) => {
        postToHost({ type: "error", stage: "runtime", message: String(ev.message) });
      });

      window.addEventListener("unhandledrejection", (ev) => {
        postToHost({
          type: "error",
          stage: "hydrate",
          message: ev.reason instanceof Error ? ev.reason.message : String(ev.reason),
        });
      });

      window.addEventListener("message", async (ev) => {
        const msg = ev.data;
        if (!msg || typeof msg !== "object") return;

        if (msg.type === "load") {
          postToHost({ type: "log", message: "got load" });
          state = {
            templateHtml: msg.templateHtml,
            schema: msg.schema,
            brand: msg.brand,
            brandName: msg.brandName ?? "craftlee",
            vars: msg.vars ?? {},
            aspect: msg.aspect,
            duration: msg.duration,
          };
          try {
            await setupTemplate();
            await hydrateAndSeek();
            postToHost({ type: "log", message: "renderStage done, posting ready" });
            postToHost({ type: "ready" });
          } catch (err) {
            postToHost({
              type: "error",
              stage: "renderStage",
              message: err instanceof Error ? err.message : String(err),
            });
          }
        } else if (msg.type === "hydrate") {
          if (!state) return;
          state.vars = msg.vars ?? state.vars;
          try {
            // Just re-hydrate slot values + re-seek the timeline; leave
            // the template DOM and registered GSAP timeline in place.
            await hydrateAndSeek();
          } catch (err) {
            postToHost({
              type: "error",
              stage: "rehydrate",
              message: err instanceof Error ? err.message : String(err),
            });
          }
        }
      });

      // Fully replaces the iframe body with the template's body content,
      // re-creating <script> elements so they actually execute (cloneNode
      // alone does not re-run scripts). Runs once per 'load' message.
      async function setupTemplate() {
        if (!state) return;

        const parser = new DOMParser();
        const tplDoc = parser.parseFromString(state.templateHtml, "text/html");

        // Inject template <head> children (fonts, GSAP CDN, <style>) once.
        if (!document.head.dataset.tplHydrated) {
          await injectChildren(tplDoc.head, document.head);
          document.head.dataset.tplHydrated = "1";
        }

        // Replace body content. <script> tags re-created so they execute.
        document.body.innerHTML = "";
        await injectChildren(tplDoc.body, document.body);
      }

      // Append children of `from` onto `into`, recreating <script> elements
      // (with src or inline text) so they execute. Awaits external script
      // loads so subsequent inline scripts can rely on them.
      async function injectChildren(from, into) {
        for (const node of Array.from(from.children)) {
          if (node.tagName === "SCRIPT") {
            const fresh = document.createElement("script");
            for (const attr of Array.from(node.attributes)) {
              fresh.setAttribute(attr.name, attr.value);
            }
            if (node.src) {
              const loaded = new Promise((resolve) => {
                fresh.addEventListener("load", resolve, { once: true });
                fresh.addEventListener("error", resolve, { once: true });
              });
              into.appendChild(fresh);
              await loaded;
            } else {
              fresh.textContent = node.textContent;
              into.appendChild(fresh);
            }
          } else {
            into.appendChild(node.cloneNode(true));
          }
        }
      }

      async function hydrateAndSeek() {
        if (!state) return;
        const { hydrateInDocument } = await import("/src/client/preview/hydrator.ts");
        const { createClientResolver } = await import("/src/client/preview/asset-resolver.ts");

        const resolve = createClientResolver({
          brands: { [state.brandName]: state.brand },
          assetUrl: (name) => `/api/assets/file?name=${encodeURIComponent(name)}`,
        });

        await hydrateInDocument(
          document,
          {
            schema: state.schema,
            vars: state.vars,
            aspect: state.aspect,
            duration: state.duration,
          },
          resolve,
        );

        fitStage();
        seekTimelineToEnd();

        // Surface duration from any registered timeline; falls back to
        // the schema's default.
        const reg = window.__timelines || {};
        const tl = reg[state.schema?.name] ?? Object.values(reg)[0];
        const dur = tl?.totalDuration?.() ?? state.duration ?? 12;
        postToHost({ type: "duration", value: dur });
      }

      // Move every registered GSAP-style timeline to its final frame so
      // the preview shows the animation's end-state — otherwise the
      // template's initial CSS keeps lines/badge/CTA at opacity:0.
      function seekTimelineToEnd() {
        const reg = window.__timelines || {};
        for (const tl of Object.values(reg)) {
          try {
            if (typeof tl?.progress === "function") tl.progress(1, false);
            else if (typeof tl?.seek === "function" && typeof tl.totalDuration === "function") {
              tl.seek(tl.totalDuration());
            }
          } catch {
            // ignore individual timeline errors
          }
        }
      }

      function fitStage() {
        const stage = document.getElementById("stage");
        if (!stage) return;
        const sw = parseFloat(stage.dataset.width) || stage.offsetWidth || 1080;
        const sh = parseFloat(stage.dataset.height) || stage.offsetHeight || 1920;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / sw, vh / sh);
        stage.style.transform = `scale(${scale})`;
      }
      window.addEventListener("resize", fitStage);
    </script>
  </body>
</html>
